name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: |
          pip install flet
          pip install requests
      - name: Build APK
        # Добавляем имя пакета и стабильную версию Python 3.11
        run: flet build apk --package-name com.flet.my_vtk_app --python-version 3.11
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-release
          path: build/apk/*.apk
