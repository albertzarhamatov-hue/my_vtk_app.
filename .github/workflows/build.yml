name: Build Flet APK

on: [push]

# Принудительно включаем Node.24, чтобы GitHub не ругался
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-build requests

      - name: Build APK
        # Добавляем --verbose, чтобы в логах видеть, если что-то пойдет не так
        # И явно указываем файл запуска
        run: flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Проверь этот путь, Flet обычно кладет сюда:
          path: build/apk/*.apk
